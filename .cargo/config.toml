# Target-specific build configuration for the CLAUDE.md performance targets.
# These apply ONLY when you explicitly build for the given target, so the default
# host build (`cargo build`) is unaffected and needs no extra toolchain.
#
#   Linux, fully-static musl binary (no dynamic-link bloat):
#     rustup target add x86_64-unknown-linux-musl
#     cargo build --release --target x86_64-unknown-linux-musl
#
#   Windows, static CRT (no redistributable runtime required):
#     cargo build --release --target x86_64-pc-windows-msvc

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

# ⚠ `+crt-static` for the MSVC targets is NOT set here, deliberately.
#
# A `[target.x86_64-pc-windows-msvc]` block applies to EVERY build on Windows — not just the explicit
# static-release build — because that IS the host target there. Forcing a static CRT on the ordinary
# build fails the link (`link.exe: exit code 1104`, "cannot open file"), since parts of the graph expect
# the dynamic CRT. So the flag belongs to the ONE job that actually wants a static binary, and it is set
# there via `RUSTFLAGS` (see .github/workflows/ci.yml), not imposed on every Windows contributor.
#
# Same rule as the sccache wrapper that broke every OS: a committed config must not impose a constraint
# the ordinary build cannot satisfy.

# Build-artifact cache. Shared dependencies (stylo, mozjs bindings, taffy, hyper …) dominate the
# compile cycle and are rebuilt identically across every session and every parallel branch; caching
# them is the single cheapest speed-up available to the loop.
# ⚠ `rustc-wrapper = "sccache"` USED TO BE HERE, AND IT MADE THIS REPO UNBUILDABLE BY ANYONE WHO DID NOT
# ALREADY HAVE sccache INSTALLED.
#
# `.cargo/config.toml` is committed, so the wrapper applied to every clone — and cargo does not degrade
# gracefully when the wrapper is missing. It fails outright:
#
#     error: could not execute process `sccache .../rustc -vV` (never executed)
#     Caused by: No such file or directory (os error 2)
#
# That is exactly what broke **every CI job on every OS** — the badge lane, mac, windows, and all three
# static targets — from the moment the line was added. It never showed up locally because sccache *is*
# installed here, which is the whole shape of the bug: **a committed artifact must be usable by anyone who
# clones this repo**, and this one silently required a tool no clone brings with it.
#
# The wrapper is now **opt-in via the environment**, which degrades correctly: `scripts/mem-guard.sh`
# exports `RUSTC_WRAPPER=sccache` **only if sccache is actually on PATH**, and CI installs it explicitly.
# Same caching, no hard dependency.
