<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .ib{display:inline-block;width:80px;height:30px;vertical-align:top}
</style></head>
<body>
  <!-- Three inline-blocks flow horizontally with normal whitespace between them. -->
  <span id="p-ib1" class="ib" style="background:#8ab"></span>
  <span id="p-ib2" class="ib" style="background:#b8a"></span>
  <span id="p-ib3" class="ib" style="background:#ab8"></span>
  <!-- A block after inline content clears to the next line. -->
  <div id="p-below" style="width:120px;height:25px;background:#333"></div>
</body></html>
