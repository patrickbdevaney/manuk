<!doctype html><body style="margin:0"><div style="width:400px">
<div id="p-div" style="width:calc(100% / 4);height:20px;background:#8ab"></div>
<div id="p-mul" style="width:calc(30px * 3);height:20px;background:#b8a"></div>
<div id="p-paren" style="width:calc((100% - 40px) / 2);height:20px;background:#ab8"></div>
<div id="p-nest" style="width:calc(100% - calc(20px + 20px));height:20px;background:#333"></div></div></body>
