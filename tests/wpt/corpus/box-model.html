<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
</style></head>
<body>
  <!-- content-box: total width = 100 + 2*20 padding + 2*5 border = 150 -->
  <div id="p-content-box" style="box-sizing:content-box;width:100px;height:40px;padding:20px;border:5px solid #333;background:#8ab"></div>
  <!-- border-box: total width stays 150, content shrinks -->
  <div id="p-border-box" style="box-sizing:border-box;width:150px;height:80px;padding:20px;border:5px solid #333;background:#b8a;margin-top:10px"></div>
</body></html>
