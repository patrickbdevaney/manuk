name: demo

# ── THE IN-BROWSER DEMO → GitHub Pages.
#
# Its OWN lane, deliberately separate from the verify wall:
#   * it never gates a merge and never competes with tick velocity;
#   * it builds a `wasm32-unknown-unknown` bundle and deploys a static site;
#   * `workflow_dispatch` means it can be re-cut on demand without touching the loop.
#
# Threading is single-threaded ON PURPOSE, which is what keeps this host clean: no SharedArrayBuffer,
# so no COOP/COEP headers — which a static host cannot set anyway.

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'engine/**'
      - 'scripts/demo-*.sh'
      - '.github/workflows/demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2
  CARGO_NET_RETRY: 10
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: wasm-bindgen CLI (pinned to the crate version)
        run: |
          VER=$(grep -oE 'wasm-bindgen = "=[0-9.]+"' demo/Cargo.toml | grep -oE '[0-9.]+')
          cargo install wasm-bindgen-cli --version "$VER" --locked

      # The engine itself, compiled to wasm: Stylo + Taffy + tiny-skia + our DOM/layout/paint.
      # G_DEMO_LIVE drives the built demo in a real headless Chrome over CDP and refuses to let a
      # demo ship that cannot be proven to have PAINTED. It needs a browser and a websocket client.
      # `google-chrome` is preinstalled on ubuntu-latest; `websockets` is not.
      - name: the gate's dependencies (a browser, and a way to talk to it)
        run: |
          python3 -m pip install --quiet --user websockets
          echo "chrome: $(google-chrome --version 2>/dev/null || chromium --version 2>/dev/null || echo MISSING)"

      - name: build the engine for wasm
        run: ./scripts/ci-run.sh "wasm demo build" ./scripts/demo-build.sh

      # OPTIONAL — and it must be optional in the exit-code sense too, not just in the comment. The demo
      # works fine unshrunk; a failing optimiser must never fail the deploy. (It did.)
      - name: shrink the wasm (best-effort; never fatal)
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen || exit 0
          command -v wasm-opt >/dev/null || exit 0
          # rustc emits sign-ext / bulk-memory / mutable-globals / nontrapping-fptoint by default now, and
          # wasm-opt REJECTS the module unless each is explicitly allowed ("all used features should be
          # allowed" — 10k lines of validator noise for a step that is merely a size optimisation).
          wasm-opt -Oz demo/www/manuk_demo_bg.wasm -o /tmp/opt.wasm \
            --enable-bulk-memory --enable-sign-ext --enable-mutable-globals \
            --enable-nontrapping-float-to-int --enable-reference-types --enable-simd \
            && mv /tmp/opt.wasm demo/www/manuk_demo_bg.wasm \
            && ls -lh demo/www/manuk_demo_bg.wasm | awk '{print "  optimized: "$5}'
          exit 0

      # The snapshots are COMMITTED (see demo/www/.gitignore) — a deploy must not depend on three live
      # websites still being up and unchanged, nor on a runner having Chromium.
      - name: sanity — the demo has pages to render
        run: |
          test -f demo/www/pages.json || { echo "::error::demo/www/pages.json missing — run scripts/demo-pages.sh and commit"; exit 1; }
          echo "  pages: $(python3 -c "import json;print(len(json.load(open('demo/www/pages.json'))))")"

      # `enablement: true` turns Pages ON via the API if it is not already — otherwise this action fails
      # with a bare 404 and nothing explains that the repo simply has no Pages site yet.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/www
      - id: deploy
        uses: actions/deploy-pages@v4
